<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Black background -->
  <rect width="32" height="32" rx="6" fill="#000000"/>
  <!-- Outer eye shape -->
  <path d="M4 16 C8 9, 24 9, 28 16 C24 23, 8 23, 4 16 Z" stroke="#FF5F1F" stroke-width="1.5" fill="none"/>
  <!-- Iris -->
  <circle cx="16" cy="16" r="5" stroke="#FF5F1F" stroke-width="1.5" fill="none"/>
  <!-- Pupil -->
  <circle cx="16" cy="16" r="2" fill="#FF5F1F"/>
  <!-- Corner brackets TL -->
  <path d="M2 7 L2 2 L7 2" stroke="#FF5F1F" stroke-width="1.2" fill="none" stroke-linecap="square"/>
  <!-- Corner brackets TR -->
  <path d="M30 7 L30 2 L25 2" stroke="#FF5F1F" stroke-width="1.2" fill="none" stroke-linecap="square"/>
  <!-- Corner brackets BL -->
  <path d="M2 25 L2 30 L7 30" stroke="#FF5F1F" stroke-width="1.2" fill="none" stroke-linecap="square"/>
  <!-- Corner brackets BR -->
  <path d="M30 25 L30 30 L25 30" stroke="#FF5F1F" stroke-width="1.2" fill="none" stroke-linecap="square"/>
</svg>
